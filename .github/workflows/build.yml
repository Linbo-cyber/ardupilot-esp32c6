name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch MAVLink headers
        run: bash scripts/fetch_mavlink.sh

      - name: Setup ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3
          target: esp32c6
          command: |
            idf.py set-target esp32c6
            idf.py build

      - name: Package firmware
        run: |
          mkdir -p release
          cp build/bootloader/bootloader.bin release/
          cp build/ardupilot-esp32c6.bin release/
          cp build/partition_table/partition-table.bin release/
          cp build/flash_args release/
          cd release && tar czf ../firmware-esp32c6.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: firmware-esp32c6.tar.gz

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: firmware-esp32c6.tar.gz
          generate_release_notes: true
